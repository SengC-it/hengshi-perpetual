name: Hengshi manual verification

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: Protected endpoint to verify
        required: true
        default: cron
        type: choice
        options:
          - cron
          - test-email

permissions:
  contents: read

concurrency:
  group: hengshi-four-hour-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger protected Vercel endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TARGET_ENDPOINT: ${{ inputs.endpoint || 'cron' }}
        run: |
          curl \
            --fail-with-body \
            --show-error \
            --silent \
            --max-time 330 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "https://hengshi-perpetual.vercel.app/api/${TARGET_ENDPOINT}"
